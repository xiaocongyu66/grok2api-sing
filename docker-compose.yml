name: grok2api

services:
  grok2api:
    container_name: grok2api
    image: "${GROK2API_IMAGE:-ghcr.io/xiaocongyu66/grok2api-sing:latest}"
    ports:
      - "${GROK2API_PORT:-8000}:8000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - "${GROK2API_CONFIG:-./config.yaml}:/run/grok2api/config.yaml:ro"
      - grok2api-data:/app/data
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    # 多实例时取消注释并依赖 redis：
    # depends_on:
    #   - redis

  # 多实例 / 需要共享限流·粘滞·Web 会话缓存时启用 Redis。
  # config.yaml:
  #   runtimeStore:
  #     driver: redis
  #     redis:
  #       address: "redis:6379"
  #       keyPrefix: "grok2api:"
  # redis:
  #   container_name: grok2api-redis
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   command: ["redis-server", "--save", "", "--appendonly", "no"]
  #   volumes:
  #     - grok2api-redis:/data

  # 如果出口 IP 不干净，可取消以下注释使用 WARP 作为落地代理。
  # 启用后，在管理端“设置 -> 出口代理”中新增 socks5://warp:1080。
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

volumes:
  grok2api-data:
  # grok2api-redis:
